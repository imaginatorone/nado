server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: nado-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nado}
    username: ${SPRING_DATASOURCE_USERNAME:nado_user}
    password: ${SPRING_DATASOURCE_PASSWORD:nado_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# --- Application config ---
app:
  # Auth mode: "legacy" (self-issued JWT) | "keycloak" (OAuth2 Resource Server)
  # Target: keycloak. Legacy is transitional only.
  auth:
    mode: ${AUTH_MODE:legacy}

  jwt:
    secret: ${JWT_SECRET:NadoDevSecretKey2026OnlyForLocalDevelopment!!}
    expiration-ms: 86400000  # 24 часа

  keycloak:
    issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/nado}
    jwk-set-uri: ${KEYCLOAK_JWK:http://localhost:8180/realms/nado/protocol/openid-connect/certs}
    public-url: ${KEYCLOAK_PUBLIC_URL:http://localhost:8180}
    client-id: nado-frontend

  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-images-per-ad: 10
    allowed-image-extensions: .jpg,.jpeg,.png,.gif,.webp
    allowed-file-extensions: .jpg,.jpeg,.png,.gif,.webp,.pdf,.doc,.docx,.mp4,.mov,.avi

  admin:
    email: ${ADMIN_EMAIL:admin@nado.ru}
    password: ${ADMIN_PASSWORD:N@d0_Adm!n_2026}
    seed-enabled: ${ADMIN_SEED_ENABLED:false}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173}

  # email notifications: отправляются только если emailVerified = true
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@nado.ru}

  # spring.mail подключается к существующему spring: блоку через вложенность
  # smtp настройки вынесены в отдельные env для безопасности

# spring mail autoconfiguration
spring.mail:
  host: ${SMTP_HOST:localhost}
  port: ${SMTP_PORT:587}
  username: ${SMTP_USER:}
  password: ${SMTP_PASSWORD:}
  properties:
    mail.smtp.auth: ${SMTP_AUTH:false}
    mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}

logging:
  level:
    com.solarl.nado: INFO
    org.springframework.security: INFO
